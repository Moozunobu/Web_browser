        game: document.getElementById('game-screen'),
        roomCode: document.getElementById('input-room-code'),
        btnJoin: document.getElementById('btn-join-room'),
        btnAI: document.getElementById('btn-ai-play'),
        statusBar: document.getElementById('status-bar'),
        btnDraw: document.getElementById('btn-draw'),
        btnLeave: document.getElementById('btn-leave-game'),
        btnEndTurn: document.getElementById('btn-end-turn'),
        oppNameTag: document.getElementById('opp-name-tag'),
        oppCardsContainer: document.getElementById('opp-cards-container'),
        playerCardsContainer: document.getElementById('player-cards-container'),
        discardContainer: document.getElementById('discard-card-container'),
        headerText: document.getElementById('header-text')
      };

      // ─── カードの生成・描画ヘルパー ───
      function createRandomCard() {
        if (Math.random() < 0.1) {
          return { color: 'wild', value: 'Wild' };
        }
        const color = COLORS[Math.floor(Math.random() * COLORS.length)];
        const value = VALUES[Math.floor(Math.random() * VALUES.length)];
        return { color, value };
      }

      function buildCardDOM(card, isPlayable = false, clickHandler = null) {
        const div = document.createElement('div');
        div.className = 'card ' + card.color;
        
        let label = card.value;
        if (card.value === 'Draw2') label = '+2';
        if (card.value === 'Wild') label = 'W';
        div.textContent = label;

        if (isPlayable && clickHandler) {
          div.addEventListener('click', clickHandler);
        }
        return div;
      }

      // ルームUI更新
      function updateUI() {
        if (!gameActive) return;

        // 1. 捨て札(場札)の描画
        DOM.discardContainer.innerHTML = '';
        if (discardPile.length > 0) {
          const topCard = discardPile[discardPile.length - 1];
          const displayCard = { ...topCard };
          if (topCard.color === 'wild' && activeColor) displayCard.color = activeColor;
          
          const discardDOM = buildCardDOM(displayCard);
          
          // 出し手に応じたスライドアニメーションの適用
          if (lastAction === 'play_me') {
            discardDOM.classList.add('played-anim');
          } else if (lastAction === 'play_opp') {
            discardDOM.classList.add('played-opp-anim');
          }
          
          DOM.discardContainer.appendChild(discardDOM);
        }

        // 2. あなたの手札
        DOM.playerCardsContainer.innerHTML = '';
        myHand.forEach((card, idx) => {
          const playable = isMyTurn && canPlay(card);
          const dom = buildCardDOM(card, playable, () => playCard(idx));
          if (!playable) dom.style.opacity = '0.5';
          
          // 山札からカードを引いた時のアニメーション適用（最後の1枚）
          if (lastAction === 'draw' && idx === myHand.length - 1) {
            dom.classList.add('drawn-anim');
          }
          DOM.playerCardsContainer.appendChild(dom);
        });

        // 3. 相手の手札（裏面表示）
        DOM.oppCardsContainer.innerHTML = '';
        const count = isSolo ? oppHand.length : oppHandCount;
        for (let i = 0; i < count; i++) {
          const cardBack = document.createElement('div');
          cardBack.className = 'card-back';
          cardBack.textContent = 'UNO';
          DOM.oppCardsContainer.appendChild(cardBack);
        }
        DOM.oppNameTag.textContent = oppName + " (手札: " + count + "枚)";

        // 4. ステータス・手番の案内
        if (isMyTurn) {
          if (stackedValue !== null) {
            DOM.statusBar.textContent = "🟢 同数字（" + stackedValue + "）の連続出しが可能です。出さない場合は「ターン終了」を押してください。";
            DOM.btnDraw.style.pointerEvents = 'none';
            DOM.btnDraw.style.opacity = '0.5';
          } else {
            DOM.statusBar.textContent = "🟢 あなたの手番です。場札に合うカードを出すか、山札から引いてください。";
            DOM.btnDraw.style.pointerEvents = 'auto';
            DOM.btnDraw.style.opacity = '1';
          }
        } else {
          DOM.statusBar.textContent = "🔴 " + oppName + " の手番です。相手の操作を待っています...";
          DOM.btnDraw.style.pointerEvents = 'none';
          DOM.btnDraw.style.opacity = '0.5';
        }

        // アニメーションステートのリセット
        lastAction = null;

        checkGameOver();
      }

      // ルールチェック
      function canPlay(card) {
        if (stackedValue !== null) {
          return card.value === stackedValue; 
        }
        if (discardPile.length === 0) return true;
        const top = discardPile[discardPile.length - 1];
        
        if (card.color === 'wild') return true;

        const topColor = top.color === 'wild' ? activeColor : top.color;
        if (card.color === topColor) return true;

        if (card.value === top.value) return true;

        return false;
      }

      // カードを出す
      function playCard(idx) {
        if (!isMyTurn) return;
        const card = myHand.splice(idx, 1)[0];
        discardPile.push(card);

        // 自分の出し手アニメーションをセット
        lastAction = 'play_me';

        if (card.color === 'wild') {
          activeColor = COLORS[Math.floor(Math.random() * COLORS.length)];
        } else {
          activeColor = card.color;
        }

        // 連続出しチェック
        const hasMoreSameValue = myHand.some(c => c.value === card.value);

        if (hasMoreSameValue) {
          stackedValue = card.value;
          DOM.btnEndTurn.style.display = 'block';
          updateUI();
        } else {
          endMyTurn(card);
        }
      }

      // ターン終了処理
      function endMyTurn(card) {
        stackedValue = null;
        DOM.btnEndTurn.style.display = 'none';

        let turnSkip = false;
        let drawPenalty = 0;
        if (card.value === 'Skip') turnSkip = true;
        if (card.value === 'Draw2') drawPenalty = 2;

        isMyTurn = false;

        if (isSolo) {
          updateUI();
          if (drawPenalty > 0) {
            for (let i = 0; i < drawPenalty; i++) oppHand.push(createRandomCard());
          }
          if (turnSkip) {
            isMyTurn = true;
            setTimeout(updateUI, 1000);
          } else {
            setTimeout(aiTurn, 1500);
          }
        } else {
          sendGameState(turnSkip, drawPenalty);
          updateUI();
        }
      }

      // 山札からカードを引く
      function drawCard() {
        if (!isMyTurn || stackedValue !== null) return;
        myHand.push(createRandomCard());
        
        // カードを引いたアニメーションをセット
        lastAction = 'draw';

        isMyTurn = false;

        if (isSolo) {
          updateUI();
          setTimeout(aiTurn, 1200);
        } else {
          sendGameState(false, 0);
          updateUI();
        }
      }

      // ゲーム終了条件
      function checkGameOver() {
        if (!gameActive) return;
        
        if (myHand.length === 0) {
          gameActive = false;
          isMyTurn = false;
          DOM.statusBar.textContent = "🏆 あなたの勝利！すべてのカードを出し切りました！";
          alert("おめでとうございます！あなたの勝利です！");
        } else if ((isSolo && oppHand.length === 0) || (!isSolo && oppHandCount === 0 && oppId)) {
          gameActive = false;
          isMyTurn = false;
          DOM.statusBar.textContent = "敗北... " + oppName + " が先にカードを出し切りました。";
          alert("残念... " + oppName + "の勝利です。");
        }
      }

      // ─── AI (オフライン) 手番処理 ───
      function aiTurn() {
        if (!gameActive) return;
        
        let playIdx = -1;
        for (let i = 0; i < oppHand.length; i++) {
          if (canPlay(oppHand[i])) {
            playIdx = i;
            break;
          }
        }

        if (playIdx !== -1) {
          const card = oppHand.splice(playIdx, 1)[0];
          discardPile.push(card);
          
          // 相手の出し手アニメーションをセット
          lastAction = 'play_opp';

          let turnSkip = false;
          let drawPenalty = 0;

          if (card.color === 'wild') {
            activeColor = COLORS[Math.floor(Math.random() * COLORS.length)];
          } else {
            activeColor = card.color;
          }

          if (card.value === 'Skip') turnSkip = true;
          if (card.value === 'Draw2') drawPenalty = 2;

          if (drawPenalty > 0) {
            for (let i = 0; i < drawPenalty; i++) myHand.push(createRandomCard());
          }

          if (turnSkip) {
            setTimeout(aiTurn, 1500);
          } else {
            isMyTurn = true;
          }
        } else {
          oppHand.push(createRandomCard());
          // 相手のドロー
          lastAction = 'draw_opp';
          isMyTurn = true;
        }

        updateUI();
      }

      // ─── Supabaseリアルタイム同期 ───
      function joinRoom(roomCode) {
        if (!supabaseClient) return alert("シミュレーターの設定でSupabaseが連携されていないため動作しません。");
        
        isSolo = false;
        DOM.headerText.textContent = "UNO Room: " + roomCode;
        DOM.lobby.style.display = 'none';
        DOM.game.style.display = 'flex';

        myHand = Array.from({ length: 7 }, createRandomCard);
        oppHandCount = 7;
        discardPile = [{ color: 'red', value: '5' }];
        activeColor = 'red';

        gameChannel = supabaseClient.channel('uno-' + roomCode);
        gameChannel
          .on('broadcast', { event: 'join' }, ({ payload }) => {
            if (payload.id !== myId) {
              oppId = payload.id;
              oppName = payload.name;
              gameChannel.send({ type: 'broadcast', event: 'welcome', payload: { id: myId, name: myName, handCount: myHand.length, discard: discardPile } });
              gameActive = true;
              isMyTurn = true;
              updateUI();
            }
          })
          .on('broadcast', { event: 'welcome' }, ({ payload }) => {
            if (payload.id !== myId) {
              oppId = payload.id;
              oppName = payload.name;
              oppHandCount = payload.handCount;
              discardPile = payload.discard;
              gameActive = true;
              isMyTurn = false;
              updateUI();
            }
          })
          .on('broadcast', { event: 'state' }, ({ payload }) => {
            if (payload.id !== myId) {
              // 相手のカード枚数の増減から出し手を判定してアニメーション
              if (payload.handCount < oppHandCount) {
                lastAction = 'play_opp';
              } else if (payload.handCount > oppHandCount) {
                lastAction = 'draw_opp';
              }
              
              oppHandCount = payload.handCount;
              discardPile = payload.discard;
              activeColor = payload.activeColor;

              if (payload.drawPenalty > 0) {
                for (let i = 0; i < payload.drawPenalty; i++) {
                  myHand.push(createRandomCard());
                }
              }

              if (payload.turnSkip) {
                isMyTurn = false;
                gameChannel.send({
                  type: 'broadcast',
                  event: 'state',
                  payload: { id: myId, handCount: myHand.length, discard: discardPile, activeColor: activeColor, turnSkip: false, drawPenalty: 0, myTurnNext: true }
                });
              } else if (payload.myTurnNext || !payload.turnSkip) {
                isMyTurn = true;
              }

              updateUI();
            }
          })
          .on('broadcast', { event: 'leave' }, () => {
            alert("対戦相手が退出しました。");
            leaveGame();
          })
          .subscribe((status) => {
            if (status === 'SUBSCRIBED') {
              gameChannel.send({ type: 'broadcast', event: 'join', payload: { id: myId, name: myName } });
            }
          });
      }

      function sendGameState(turnSkip = false, drawPenalty = 0) {
        if (!gameChannel) return;
        gameChannel.send({
          type: 'broadcast',
          event: 'state',
          payload: {
            id: myId,
            handCount: myHand.length,
            discard: discardPile,
            activeColor: activeColor,
            turnSkip: turnSkip,
            drawPenalty: drawPenalty,
            myTurnNext: false
          }
        });
      }

      function startAIGame() {
        isSolo = true;
        oppName = "AI対戦相手";
        DOM.headerText.textContent = "We talks UNO (vs AI)";
        DOM.lobby.style.display = 'none';
        DOM.game.style.display = 'flex';

        myHand = Array.from({ length: 7 }, createRandomCard);
        oppHand = Array.from({ length: 7 }, createRandomCard);
        discardPile = [{ color: 'blue', value: '7' }];
        activeColor = 'blue';

        gameActive = true;
        isMyTurn = true;

        updateUI();
      }

      function leaveGame() {
        if (gameChannel) {
          gameChannel.send({ type: 'broadcast', event: 'leave', payload: { id: myId } });
          supabaseClient.removeChannel(gameChannel);
          gameChannel = null;
        }
        isSolo = false;
        gameActive = false;
        DOM.lobby.style.display = 'flex';
        DOM.game.style.display = 'none';
        DOM.headerText.textContent = "We talks UNO";
      }

      // ─── イベント登録 ───
      DOM.btnJoin.addEventListener('click', () => {
        const code = DOM.roomCode.value.trim();
        if (code) joinRoom(code);
      });
      DOM.btnAI.addEventListener('click', startAIGame);
      DOM.btnLeave.addEventListener('click', leaveGame);
      DOM.btnDraw.addEventListener('click', drawCard);
      
      // 連続出し（スタック状態）を終了して相手にターンを渡すイベント
      DOM.btnEndTurn.addEventListener('click', () => {
        if (stackedValue !== null) {
          const lastCard = discardPile[discardPile.length - 1];
          endMyTurn(lastCard);
        }
      });

    })();
  \x3C/script\x3E
</body>
</html>

  // ─── コマンドライン ───────────────────────────────────────────────────────
  function writeToConsole(text, isError = false) {
    const span = document.createElement("div");
    span.style.color = isError ? "#ff3333" : "#00ff66";
    span.textContent = text;
    DOMElements.consoleBody.appendChild(span);
    DOMElements.consoleBody.scrollTop = DOMElements.consoleBody.scrollHeight;
  }

  function executeCommand(input) {
    const cmd = input.trim().toLowerCase();
    if (!cmd) return;
    writeToConsole(`> ${input}`);

    if (cmd === 'this web in my book') {
        const activeTab = tabs.find(t => t.id === activeId);
        if (!activeTab || !activeTab.url) return void writeToConsole("エラー: 現在有効なWebページが開かれていません。", true);
        const bookmarks = getBookmarks();
        if (bookmarks.some(b => b.url === activeTab.url)) return void writeToConsole("案内: すでに登録されています: " + activeTab.title);
        bookmarks.push({ label: activeTab.title, url: activeTab.url, icon: getFavicon(activeTab.url) });
        saveBookmarks(bookmarks);
        DOMElements.contentEl.querySelectorAll(".nt-page").forEach(page => {
          const tid = +page.getAttribute("data-tabid");
          renderShortcuts(page, tid);
        });
        writeToConsole("成功: お気に入りに追加しました: 「" + activeTab.title + "」");
    } else if (cmd === 'view-source') {
        const activeTab = tabs.find(t => t.id === activeId);
        if (!activeTab || !activeTab.url) return void writeToConsole("エラー: 開いているWebページがありません。", true);
        const iframe = DOMElements.leftPane.querySelector(`iframe[data-tabid="${activeId}"]`);
        if (!iframe) return void writeToConsole("エラー: ソースを取得可能なフレームが存在しません。", true);
        try {
          if (iframe.contentDocument && iframe.contentDocument.documentElement) {
            const htmlCode = iframe.contentDocument.documentElement.outerHTML;
            writeToConsole(`--- ${activeTab.url} のコード ---`);
            writeToConsole(htmlCode);
            writeToConsole("--- コード表示終了 ---");
          } else throw new Error("CORS restriction");
        } catch (e) {
          writeToConsole(`[セキュリティ制限(CORS)により取得不可]\\n現在のWebページ (${activeTab.url}) は外部ドメインであるため、ブラウザのセキュリティ仕様により中身のコードをJavaScriptで直接覗き見ることができません。`, true);
        }
    } else if (cmd === 'this browser-version') {
        writeToConsole(`Browser Version: ${BROWSER_VERSION}`);
    } else if (cmd === 'clear') {
        DOMElements.consoleBody.innerHTML = '';
    } else if (cmd === 'help command ? -a') {
        writeToConsole(`使用可能なコマンド:\\n  This web in my book   - 現在のページをお気に入りに追加\\n  view-source           - 現在ページのソースコードを表示 (CORS制限あり)\\n  this browser-version  - バージョン情報を表示\\n  clear                 - コンソール画面をクリア\\n  Help command ? -a     - このヘルプメッセージを表示`);
    } else {
      writeToConsole("エラー: 未知のコマンド「" + cmd + "」です。'Help command ? -a' と入力してください。", true);
    }
    DOMElements.consoleInput.value = '';
  }

  // ─── お気に入り ──────────────────────────────────────────────────────────
  function getBookmarks() {
    const data = localStorage.getItem("my_browser_bookmarks");
    return data ? JSON.parse(data) : [
      { label: "取扱説明書", url: "https://guide.info", icon: "ℹ️" },
      { label: "Wikipedia", url: "https://ja.wikipedia.org", icon: "📖" },
      { label: "We talks", url: "https://wetalks.chat", icon: "💬" },
      { label: "ヨットゲーム", url: "https://yacht.game", icon: "🎲" },
      { label: "UNOゲーム", url: "https://uno.game", icon: "🃏" }
    ];
  }
  function saveBookmarks(bms) {
    localStorage.setItem("my_browser_bookmarks", JSON.stringify(bms));
  }
  const FAVICON_MAP = { "wikipedia.org": "📖", "reddit.com": "📰", "amazon.co.jp": "📦", "amazon.com": "📦", "wetalks.chat": "💬", "yacht.game": "🎲", "uno.game": "🃏", "guide.info": "ℹ️" };
  function getFavicon(url) {
    try {
      const host = (new URL(url)).hostname.replace(/^www\./, "");
      for (const [k, v] of Object.entries(FAVICON_MAP)) if (host.includes(k)) return v;
    } catch (_) {}
    return "🌐";
  }

  // ─── 履歴管理 & 画面描画 ───────────────────────────────────────────────────
  function normalise(raw) {
    raw = raw.trim();
    if (!raw) return null;
    if (/^https?:\/\//i.test(raw)) return raw;
    if (/\s/.test(raw) || !/\./.test(raw)) {
      return "https://www.bing.com/search?q=" + encodeURIComponent(raw);
    }
    return "https://" + raw;
  }

  function getSearchUrl(category, query) {
    const encoded = encodeURIComponent(query);
    switch (category) {
      case 'images':
        return "https://www.bing.com/images/search?q=" + encoded;
      case 'videos':
        return "https://www.bing.com/videos/search?q=" + encoded;
      case 'maps':
        return "https://www.bing.com/maps/search?q=" + encoded;
      case 'all':
      default:
        return "https://www.bing.com/search?q=" + encoded;
    }
  }

  let loadRAF = null;
  function startLoading() {
    let progress = 0;
    function step() {
      progress += (100 - progress) * 0.06;
      DOMElements.loadingBar.style.width = Math.min(progress, 90) + "%";
      if (progress < 89) loadRAF = requestAnimationFrame(step);
    }
    DOMElements.loadingBar.style.transition = "none";
    DOMElements.loadingBar.style.width = "0%";
    void DOMElements.loadingBar.offsetWidth;
    DOMElements.loadingBar.style.transition = "width 0.25s ease";
    loadRAF = requestAnimationFrame(step);
  }

  function finishLoading() {
    cancelAnimationFrame(loadRAF);
    DOMElements.loadingBar.style.width = "100%";
    setTimeout(() => { DOMElements.loadingBar.style.width = "0%"; }, 400);
  }

  function renderShortcuts(ntPageEl, tabId) {
    const sc = ntPageEl.querySelector(".shortcuts");
    if (!sc) return;
    sc.innerHTML = "";
    const currentBookmarks = getBookmarks();
    if (currentBookmarks.length === 0) {
      const placeholder = document.createElement("div");
      placeholder.style.fontSize = "12px";
      placeholder.style.color = "var(--text-dim)";
      placeholder.textContent = "お気に入りは登録されていません。";
      sc.appendChild(placeholder);
      return;
    }
    currentBookmarks.forEach((s, idx) => {
      const btn = document.createElement("div");
      btn.className = "shortcut";
      btn.setAttribute("role", "button");
      btn.setAttribute("tabindex", "0");
      btn.setAttribute("aria-label", s.label + "を開く");
      
      const ico = document.createElement("div");
      ico.className = "shortcut-icon";
      ico.textContent = s.icon;
      
      const lbl = document.createElement("div");
      lbl.textContent = s.label;
      lbl.className = "shortcut-label";
      
      // 削除ボタン (×) の作成
      const delBtn = document.createElement("button");
      delBtn.className = "shortcut-delete-btn";
      delBtn.innerHTML = "&times;";
      delBtn.title = "お気に入りを削除";
      delBtn.addEventListener("click", e => {
        e.stopPropagation(); // 親のクリックイベント（ページ移動）を抑制
        if (confirm("お気に入り「" + s.label + "」を削除しますか？")) {
          deleteBookmarkByIndex(idx);
        }
      });
      
      btn.appendChild(ico);
      btn.appendChild(lbl);
      btn.appendChild(delBtn); // 追加
      
      const go = () => navigateTo(tabId, s.url);
      btn.addEventListener("click", go);
      btn.addEventListener("keydown", e => { if (e.key === "Enter" || e.key === " ") go(); });
      sc.appendChild(btn);
    });
  }

  function deleteBookmarkByIndex(index) {
    const current = getBookmarks();
    current.splice(index, 1);
    saveBookmarks(current);
    
    // 現在開いているすべての新しいタブページのショートカットリストを再描画
    DOMElements.leftPane.querySelectorAll(".nt-page").forEach(page => {
      const tid = +page.getAttribute("data-tabid");
      renderShortcuts(page, tid);
    });
  }

  function buildNTPage(tabId) {
    const el = document.createElement("div");
    el.className = "nt-page";
    el.setAttribute("data-tabid", tabId);
    el.setAttribute("role", "tabpanel");
    const heading = document.createElement("div");
    heading.className = "nt-heading";
    heading.textContent = "新しいタブ";

    const catContainer = document.createElement("div");
    catContainer.className = "nt-categories";
    const categories = [
      { id: 'all', label: 'すべて' },
      { id: 'images', label: '画像' },
      { id: 'videos', label: '動画' },
      { id: 'maps', label: 'マップ' }
    ];
    let activeCategory = 'all';

    const searchWrap = document.createElement("div");
    searchWrap.className = "nt-search-wrap";
    const searchIcon = document.createElement("span");
    searchIcon.className = "nt-search-icon";
    searchIcon.textContent = "🔍";
    searchIcon.setAttribute("aria-hidden", "true");
    const searchInput = document.createElement("input");
    searchInput.type = "text";
    searchInput.className = "nt-search";
    searchInput.placeholder = "Bing で検索、またはURLを入力";
    searchInput.setAttribute("aria-label", "検索またはURLを入力");

    categories.forEach(cat => {
      const catBtn = document.createElement("button");
      catBtn.className = "nt-cat-btn" + (cat.id === activeCategory ? " active" : "");
      catBtn.textContent = cat.label;
      catBtn.addEventListener("click", () => {
        catContainer.querySelectorAll(".nt-cat-btn").forEach(b => b.classList.remove("active"));
        catBtn.classList.add("active");
        activeCategory = cat.id;
        
        const query = searchInput.value.trim();
        if (query) {
          navigateTo(tabId, getSearchUrl(activeCategory, query));
        }
      });
      catContainer.appendChild(catBtn);
    });

    searchInput.addEventListener("keydown", e => {
      if (e.key === "Enter") {
        const query = searchInput.value.trim();
        if (query) navigateTo(activeId, getSearchUrl(activeCategory, query));
      }
    });

    const hint = document.createElement("div");
    hint.className = "nt-hint";
    hint.textContent = "Enter キーで移動";
    const sc = document.createElement("div");
    sc.className = "shortcuts";
    searchWrap.appendChild(searchIcon);
    searchWrap.appendChild(searchInput);
    el.appendChild(heading);
    el.appendChild(catContainer);
    el.appendChild(searchWrap);
    el.appendChild(hint);
    el.appendChild(sc);
    renderShortcuts(el, tabId);
    return el;
  }

  function buildErrorPage(tabId, url) {
    const el = document.createElement("div");
    el.className = "error-page";
    el.setAttribute("data-tabid", tabId);
    el.innerHTML = `
      <div class="err-icon">🔌</div>
      <div class="err-title">ページを表示できませんでした</div>
      <div class="err-desc">
        <strong>\${url}</strong> に接続できませんでした。<br>
        URLを確認するか、別のサイトをお試しください。<br>
        ※ セキュリティ制限により、一部のサイトはiframe内では表示できません。
      </div>
      <button class="err-retry">再試行</button>
    `;
    el.querySelector(".err-retry").addEventListener("click", () => navigateTo(tabId, url));
    return el;
  }

  function renderTabs() {
    DOMElements.tabBar.querySelectorAll(".tab").forEach(e => e.remove());
    tabs.forEach(tab => {
      const el = document.createElement("div");
      el.className = "tab" + (tab.id === activeId ? " active" : "");
      el.setAttribute("role", "tab");
      el.setAttribute("aria-selected", tab.id === activeId ? "true" : "false");
      el.setAttribute("data-id", tab.id);
      el.title = tab.title;
      const fav = document.createElement("span");
      fav.className = "tab-favicon";
      fav.setAttribute("aria-hidden", "true");
      fav.textContent = tab.favicon;
      const title = document.createElement("span");
      title.className = "tab-title";
      title.textContent = tab.title;
      const close = document.createElement("span");
      close.className = "tab-close";
      close.setAttribute("role", "button");
      close.setAttribute("aria-label", "タブを閉じる");
      close.innerHTML = "&times;";
      close.addEventListener("click", e => {
        e.stopPropagation();
        closeTab(tab.id);
      });
      el.appendChild(fav);
      el.appendChild(title);
      el.appendChild(close);
      el.addEventListener("click", () => activateTab(tab.id));
      DOMElements.tabBar.insertBefore(el, DOMElements.newTabBtn);
    });
  }

  function showPage(tabId) {
    DOMElements.leftPane.querySelectorAll("[data-tabid]").forEach(p => {
      p.classList.toggle("active", +p.getAttribute("data-tabid") === tabId);
    });
  }

  function updateUrlBar(tab) {
    if (tab) {
      DOMElements.urlBar.value = tab.url || "";
      DOMElements.urlLock.textContent = tab.url && tab.url.startsWith("https://") ? "🔒" : "🌐";
    } else {
      DOMElements.urlBar.value = "";
      DOMElements.urlLock.textContent = "🌐";
    }
  }

  function updateNav(tab) {
    if (tab) {
      DOMElements.btnBack.disabled = tab.histIdx <= 0;
      DOMElements.btnFwd.disabled = tab.histIdx >= tab.history.length - 1;
    } else {
      DOMElements.btnBack.disabled = true;
      DOMElements.btnFwd.disabled = true;
    }
  }

  // ─── 【重要】ゲーム起動時のみに画面分割を完全自動トリガーする関数 ───
  function checkAndApplySplitScreen(tab) {
    if (tab && (tab.url === 'https://yacht.game' || tab.url === 'https://uno.game' || tab.url === 'http://yacht.game' || tab.url === 'http://uno.game')) {
      isSplitActive = true;
      DOMElements.body.classList.add('split-active');
      if (!DOMElements.splitChatFrame.srcdoc) {
        DOMElements.splitChatFrame.srcdoc = CHAT_APP_HTML;
      }
    } else {
      isSplitActive = false;
      DOMElements.body.classList.remove('split-active');
      DOMElements.splitChatFrame.srcdoc = '';
    }
  }

  function activateTab(id) {
    activeId = id;
    showPage(id);
    const tab = tabs.find(t => t.id === id);
    updateUrlBar(tab);
    updateNav(tab);
    renderTabs();
    checkAndApplySplitScreen(tab); // タブ切り替え時の自動判定
  }

  function openTab(url) {
    const id = ++idCounter;
    // タイポを完全に修正し、インデックス変数を histIdx にバインド
    const tab = { id: id, title: "新しいタブ", favicon: "🌐", url: null, history: [], histIdx: -1 };
    tabs.push(tab);
    const ntPage = buildNTPage(id);
    DOMElements.leftPane.appendChild(ntPage);
    activateTab(id);
    if (url) setTimeout(() => navigateTo(id, url), 0);
  }

  function closeTab(id) {
    const idx = tabs.findIndex(t => t.id === id);
    if (idx !== -1) {
      tabs.splice(idx, 1);
      DOMElements.contentEl.querySelectorAll(`[data-tabid="${id}"]`).forEach(e => e.remove());
      if (tabs.length === 0) {
        openTab(null);
      } else if (activeId === id) {
        activateTab(tabs[Math.min(idx, tabs.length - 1)].id);
      } else {
        renderTabs();
      }
    }
  }

  function navigateTo(tabId, url) {
    const tab = tabs.find(t => t.id === tabId);
    if (!tab) return;

    if (tab.history[tab.histIdx] !== url) {
      tab.history = tab.history.slice(0, tab.histIdx + 1);
      tab.history.push(url);
      tab.histIdx = tab.history.length - 1;
    }
    
    tab.url = url;
    tab.favicon = getFavicon(url);
    try {
      tab.title = (new URL(url)).hostname.replace(/^www\./, "") || url;
    } catch (_) {
      tab.title = url;
    }

    if (activeId === tabId) {
      updateUrlBar(tab);
      updateNav(tab);
    }

    DOMElements.leftPane.querySelectorAll(`[data-tabid="${tabId}"]`).forEach(e => e.remove());
    startLoading();

    const iframe = document.createElement("iframe");
    iframe.className = "page-frame" + (activeId === tabId ? " active" : "");
    iframe.setAttribute("data-tabid", tabId);
    
    // 【各種仮想アドレスのルーティング定義】
    if (url === 'https://wetalks.chat' || url === 'http://wetalks.chat') {
      iframe.setAttribute("title", "We talks");
      iframe.srcdoc = CHAT_APP_HTML;
      finishLoading();
    } else if (url === 'https://yacht.game' || url === 'http://yacht.game') {
      iframe.setAttribute("title", "ヨットゲーム");
      iframe.srcdoc = YACHT_GAME_HTML;
      finishLoading();
    } else if (url === 'https://uno.game' || url === 'http://uno.game') {
      iframe.setAttribute("title", "UNOゲーム");
      iframe.srcdoc = UNO_GAME_HTML;
      finishLoading();
    } else if (url === 'https://guide.info' || url === 'http://guide.info') {
      iframe.setAttribute("title", "Browser取扱説明書");
      iframe.srcdoc = GUIDE_PAGE_HTML;
      finishLoading();
    } else {
      iframe.setAttribute("title", tab.title);
      iframe.setAttribute("sandbox", "allow-scripts allow-same-origin allow-forms allow-popups allow-top-navigation");
      iframe.src = url;

      iframe.addEventListener("load", () => {
        finishLoading();
        try {
          const currentIframeUrl = iframe.contentWindow.location.href;
          if (currentIframeUrl && currentIframeUrl !== 'about:blank' && tab.url !== currentIframeUrl) {
            tab.history = tab.history.slice(0, tab.histIdx + 1);
            tab.history.push(currentIframeUrl);
            tab.histIdx = tab.history.length - 1;
            tab.url = currentIframeUrl;
            if (activeId === tabId) {
              updateUrlBar(tab);
              updateNav(tab);
            }
          }
          
          const t = iframe.contentDocument && iframe.contentDocument.title;
          if (t) { tab.title = t; renderTabs(); }
        } catch (_) {}
      });

      iframe.addEventListener("error", () => {
        finishLoading();
        iframe.remove();
        const err = buildErrorPage(tabId, url);
        if (activeId === tabId) err.classList.add("active");
        DOMElements.leftPane.appendChild(err);
      });
    }

    DOMElements.leftPane.appendChild(iframe);
    renderTabs();
    if (activeId === tabId) {
      checkAndApplySplitScreen(tab); // ページ遷移時の自動画面分割判定
    }
  }

  function historyGo(delta) {
    const tab = tabs.find(t => t.id === activeId);
    if (!tab) return;
    const next = tab.histIdx + delta;
    if (next >= 0 && next < tab.history.length) {
      tab.histIdx = next;
      const url = tab.history[next];
      tab.url = url;
      tab.favicon = getFavicon(url);
      try {
        tab.title = (new URL(url)).hostname.replace(/^www\./, "");
      } catch (_) {}

      updateUrlBar(tab);
      updateNav(tab);
      renderTabs();

      DOMElements.leftPane.querySelectorAll(`[data-tabid="${activeId}"]`).forEach(e => e.remove());
      startLoading();

      const iframe = document.createElement("iframe");
      iframe.className = "page-frame active";
      iframe.setAttribute("data-tabid", activeId);

      if (url === 'https://wetalks.chat' || url === 'http://wetalks.chat') {
        iframe.srcdoc = CHAT_APP_HTML;
        finishLoading();
      } else if (url === 'https://yacht.game' || url === 'http://yacht.game') {
        iframe.srcdoc = YACHT_GAME_HTML;
        finishLoading();
      } else if (url === 'https://uno.game' || url === 'http://uno.game') {
        iframe.srcdoc = UNO_GAME_HTML;
        finishLoading();
      } else if (url === 'https://guide.info' || url === 'http://guide.info') {
        iframe.srcdoc = GUIDE_PAGE_HTML;
        finishLoading();
      } else {
        iframe.setAttribute("sandbox", "allow-scripts allow-same-origin allow-forms allow-popups allow-top-navigation");
        iframe.src = url;
        iframe.addEventListener("load", () => {
          finishLoading();
          try {
            const t = iframe.contentDocument && iframe.contentDocument.title;
            if (t) { tab.title = t; renderTabs(); }
          } catch (_) {}
        });
      }
      DOMElements.leftPane.appendChild(iframe);
      checkAndApplySplitScreen(tab); // 履歴移動時の自動画面分割判定
    }
  }

  // ─── イベントリスナー ────────────────────────────────────────────────────────
  DOMElements.newTabBtn.addEventListener('click', () => openTab(null));
  DOMElements.urlBar.addEventListener('keydown', e => {
    if (e.key === 'Enter') navigateTo(activeId, normalise(DOMElements.urlBar.value));
  });
  
  DOMElements.btnBack.addEventListener('click', () => historyGo(-1));
  DOMElements.btnFwd.addEventListener('click', () => historyGo(1));
  
  DOMElements.btnReload.addEventListener('click', () => {
    const iframe = DOMElements.leftPane.querySelector(`iframe[data-tabid="${activeId}"]`);
    if (iframe) {
      startLoading();
      if (iframe.srcdoc) {
        const temp = iframe.srcdoc;
        iframe.srcdoc = '';
        void iframe.offsetWidth;
        iframe.srcdoc = temp;
        finishLoading();
      } else {
        iframe.src = iframe.src;
      }
    }
  });

  // 設定パネル関係
  DOMElements.btnSettings.addEventListener('click', () => DOMElements.settingsPanel.classList.toggle('active'));
  DOMElements.settingsPanel.querySelector('.settings-close').addEventListener('click', () => DOMElements.settingsPanel.classList.remove('active'));
  DOMElements.settingsPanel.addEventListener('change', e => {
    const { name, value, type, checked } = e.target;
    if (type === 'radio' && !checked) return;
    if (name === 'theme') settings.theme = value;
    if (name === 'tab-layout') settings.tabLayout = value;
    if (name === 'font-size') settings.fontSize = value;
    if (e.target.id === 'language-select') settings.language = value;
    saveSettings();
    applySettings();
  });

  // コンソール関係
  DOMElements.btnConsole.addEventListener('click', () => {
    DOMElements.consolePanel.classList.toggle('active');
    if (DOMElements.consolePanel.classList.contains('active')) DOMElements.consoleInput.focus();
  });
  DOMElements.consolePanel.querySelector('.settings-close').addEventListener('click', () => DOMElements.consolePanel.classList.remove('active'));
  DOMElements.consoleInput.addEventListener('keydown', e => { if (e.key === 'Enter') executeCommand(DOMElements.consoleInput.value); });
  DOMElements.consoleRun.addEventListener('click', () => executeCommand(DOMElements.consoleInput.value));

  // ─── キーボードショートカット ───
  document.addEventListener('keydown', e => {
    if ((e.ctrlKey || e.metaKey) && e.key === 't') { e.preventDefault(); openTab(null); }
    if ((e.ctrlKey || e.metaKey) && e.key === 'w') { e.preventDefault(); closeTab(activeId); }
    if ((e.altKey) && e.key === 'ArrowLeft')  { e.preventDefault(); historyGo(-1); }
    if ((e.altKey) && e.key === 'ArrowRight') { e.preventDefault(); historyGo(1); }
    if (e.key === 'F5') { e.preventDefault(); DOMElements.btnReload.click(); }
    if (e.key === 'F6' || ((e.ctrlKey || e.metaKey) && e.key === 'l')) {
      e.preventDefault(); DOMElements.urlBar.focus(); DOMElements.urlBar.select();
    }
  });

  // ─── 初期処理 ───
  loadSettings();
  openTab('https://guide.info'); // 初期起動時にマニュアル(取扱説明書)を自動表示

})();
</script>
</body>
</html>
